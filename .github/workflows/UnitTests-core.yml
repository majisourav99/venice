on:
  workflow_call:
    inputs:
      arg:
        required: true
        type: string
      artifact_suffix:
        required: true
        type: string


jobs:
  reusable_job:
    name: "Unit Tests And Coverage"
    strategy:
      fail-fast: false
      matrix:
        jdk: [ 8, 11, 17 ]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.jdk }}
          distribution: 'temurin'
          cache: 'gradle'
      - shell: bash
        run: |
          git remote set-head origin --auto
          git remote add upstream https://github.com/linkedin/venice
          git fetch upstream
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run Unit Tests with Code Coverage
        run: ./gradlew  -x :internal:venice-avro-compatibility-test:test  ${{ inputs.arg }}
      - name: Package Build Artifacts
        if: success() || failure()
        shell: bash
        run: |
          mkdir ${{ inputs.artifact_suffix }}-artifacts
          find . -path "**/build/reports/*" -or -path "**/build/test-results/*" > artifacts.list
          rsync -R --files-from=artifacts.list . ${{ inputs.artifact_suffix }}-artifacts
          tar -zcvf ${{ inputs.artifact_suffix }}-jdk${{ matrix.jdk }}-logs.tar.gz ${{ inputs.artifact_suffix }}-artifacts
      - name: Generate Fork Repo Test Reports
        if: ${{ (github.repository_owner != 'linkedin') && (success() || failure()) }}
        uses: dorny/test-reporter@v1.9.1
        env:
         NODE_OPTIONS: --max-old-space-size=9182
        with:
         token: ${{ secrets.GITHUB_TOKEN }}
         name: ${{ inputs.artifact_suffix }} Test Reports       # Name where it report the test results
         path: '**/TEST-*.xml'
         fail-on-error: 'false'
         max-annotations: '10'
         list-tests: 'failed'
         list-suites: 'failed'
         reporter: java-junit
      - name: Upload Build Artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_suffix }}-jdk${{ matrix.jdk }}
          path: ${{ inputs.artifact_suffix }}-jdk${{ matrix.jdk }}-logs.tar.gz
          retention-days: 30
